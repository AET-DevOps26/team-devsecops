server {
    listen 8080;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;

    # Redirect bare root to the app's base path
    location = / {
        return 301 /team-devsecops/;
    }

    # Proxy API calls to spring-api — same-origin from the browser's perspective
    location /api/ {
        proxy_pass http://spring-api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Serve the React SPA
    # alias strips the /team-devsecops/ prefix so files are read from /usr/share/nginx/html/
    location /team-devsecops/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /team-devsecops/index.html;
    }
}
