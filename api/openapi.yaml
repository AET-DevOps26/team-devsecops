openapi: 3.1.1
info:
  title: Cooking Assistant API
  version: 1.0.0
  description: API for recipe management and cooking assistance

servers:
  - url: http://localhost:8080/api/v1

tags:
  - name: Users
    description: User auth and preferences
  - name: Recipes
    description: Recipe storage and retrieval
  - name: AI
    description: AI-powered generation and assistance

paths:
  # -------------------------
  # USERS
  # -------------------------

  /users/register:
    post:
      tags: [Users]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "201":
          description: User created successfully
        "400":
          description: Invalid request body (e.g. blank username or password, username contains invalid characters)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/login:
    post:
      tags: [Users]
      summary: Login and receive a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthRequest"
      responses:
        "200":
          description: JWT token returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid username or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/logout:
    post:
      tags: [Users]
      summary: Logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/profile:
    get:
      tags: [Users]
      summary: Get current user profile and preferences
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile and preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Users]
      summary: Update user profile and preferences
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Profile and preferences updated
        "400":
          description: Invalid request body (e.g. blank password, username contains invalid characters)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags: [Users]
      summary: Delete current user account and all associated recipes (cascade)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: User account and all associated data deleted
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # -------------------------
  # RECIPES
  # -------------------------

  /recipes:
    get:
      tags: [Recipes]
      summary: List all recipes saved by the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of user recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipe"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags: [Recipes]
      summary: Save a recipe to the current user's collection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeInput"
      responses:
        "201":
          description: Recipe saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeCreated"
        "400":
          description: Invalid recipe data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /recipes/{recipeId}:
    get:
      tags: [Recipes]
      summary: Get a specific recipe by ID
      security:
        - bearerAuth: []
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Recipe details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "400":
          description: Recipe ID is not a valid integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Recipe belongs to a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags: [Recipes]
      summary: Update a saved recipe by ID
      security:
        - bearerAuth: []
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeUpdate"
      responses:
        "200":
          description: Recipe updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "400":
          description: Invalid recipe data or non-integer ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Recipe belongs to a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Recipes]
      summary: Delete a saved recipe by ID
      security:
        - bearerAuth: []
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "204":
          description: Recipe deleted successfully
        "400":
          description: Recipe ID is not a valid integer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Recipe belongs to a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Recipe not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # -------------------------
  # AI
  # -------------------------

  /ai/recipes:
    post:
      tags: [AI]
      summary: Generate recipes using an LLM based on a prompt
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeRequest"
      responses:
        "200":
          description: AI-generated recipes without IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeInput"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: GenAI service unavailable or returned an unparseable response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: GenAI service timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/help:
    post:
      tags: [AI]
      summary: Ask the LLM a question about a recipe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HelpRequest"
      responses:
        "200":
          description: AI-generated help text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelpResponse"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: GenAI service unavailable or returned an unparseable response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "504":
          description: GenAI service timed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

# -------------------------
# SECURITY
# -------------------------

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # -------------------------
  # SCHEMAS
  # -------------------------

  schemas:
    ErrorResponse:
      type: object
      required: [message]
      additionalProperties: false
      properties:
        message:
          type: string
          minLength: 1

    AuthResponse:
      type: object
      required: [token]
      additionalProperties: false
      properties:
        token:
          type: string
          minLength: 1
          description: JWT bearer token to include in subsequent requests

    AuthRequest:
      additionalProperties: false
      required: [username, password]
      allOf:
        - $ref: "#/components/schemas/UserCredentials"

    UserProfile:
      type: object
      required: [username, preferences]
      additionalProperties: false
      properties:
        username:
          type: string
          minLength: 1
        preferences:
          $ref: "#/components/schemas/UserPreferences"

    UserProfileUpdate:
      additionalProperties: false
      description: At least one field must be provided
      allOf:
        - $ref: "#/components/schemas/UserCredentials"
        - type: object
          properties:
            preferences:
              $ref: "#/components/schemas/UserPreferences"

    UserCredentials:
      type: object
      description: Reusable field definitions for username and password constraints
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-zA-Z0-9_.-]+$"
          description: Alphanumeric, underscores, hyphens, and dots only
        password:
          type: string
          minLength: 4
          maxLength: 128

    UserPreferences:
      type: object
      additionalProperties: false
      properties:
        language:
          type: string
          enum: [en, de, hu]
          description: Preferred UI and AI-content language as an ISO 639-1 code
        diet:
          type: array
          items:
            type: string
          description: Dietary restriction or style (e.g. vegan, keto)
        allergies:
          type: array
          items:
            type: string
          description: List of ingredients the user is allergic to
        aboutMe:
          type: array
          items:
            type: string
          description: Free-form user context provided to the AI

    RecipeIngredient:
      type: object
      required: [quantity, unit, name]
      additionalProperties: false
      properties:
        quantity:
          type: number
          minimum: 0
        unit:
          type: string
          minLength: 1
          description: Unit of measurement (e.g. g, ml, cup, tbsp)
        name:
          type: string
          minLength: 1

    RecipeNutrients:
      type: object
      required: [calories, protein, fat, carbs]
      additionalProperties: false
      properties:
        calories:
          type: integer
          minimum: 0
          description: Number of Calories (kcal)
        protein:
          type: integer
          minimum: 0
          description: Protein in grams
        fat:
          type: integer
          minimum: 0
          description: Fat in grams
        carbs:
          type: integer
          minimum: 0
          description: Carbohydrates in grams

    RecipeInput:
      type: object
      required: [title, ingredients, instructions, portions]
      additionalProperties: false
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredient"
          minItems: 1
        instructions:
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
        portions:
          type: number
          minimum: 0.5
        nutrients:
          $ref: "#/components/schemas/RecipeNutrients"

    RecipeUpdate:
      type: object
      additionalProperties: false
      description: At least one field must be provided
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredient"
          minItems: 1
        instructions:
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
        portions:
          type: number
          minimum: 0.5
        nutrients:
          $ref: "#/components/schemas/RecipeNutrients"

    RecipeCreated:
      type: object
      required: [id]
      properties:
        id:
          type: integer
          format: int64
          minimum: 1

    Recipe:
      type: object
      additionalProperties: false
      allOf:
        - $ref: "#/components/schemas/RecipeInput"
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
              minimum: 1

    RecipeRequest:
      type: object
      required: [prompt]
      additionalProperties: false
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 4096

    RecipeRequestForwarded:
      type: object
      required: [profile, prompt]
      additionalProperties: false
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        prompt:
          type: string
          minLength: 1

    HelpRequest:
      type: object
      required: [recipe, prompt]
      additionalProperties: false
      properties:
        recipe:
          $ref: "#/components/schemas/RecipeInput"
        prompt:
          type: string
          minLength: 1
          maxLength: 4096

    HelpRequestForwarded:
      type: object
      required: [profile, recipe, prompt]
      additionalProperties: false
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        recipe:
          $ref: "#/components/schemas/RecipeInput"
        prompt:
          type: string
          minLength: 1

    HelpResponse:
      type: object
      required: [response]
      additionalProperties: false
      properties:
        response:
          type: string
          minLength: 1
