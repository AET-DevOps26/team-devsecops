services:
  py-help-service:
    build: ./services/py-help-service
    ports:
      - "8090:8080"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    healthcheck:
      # call the /health endpoint and expect a 200 response
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health', timeout=2).status == 200 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 10s
    develop:
      watch:
        - action: sync+restart
          path: ./services/py-help-service
          target: /app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./services/py-help-service/requirements.txt

  spring-api:
    build: ./services/spring-api
    ports:
      - "8081:8080"
    environment:
      AI_HELP_SERVICE_URL: http://py-help-service:8080
    depends_on:
      py-help-service:
        condition: service_healthy
    healthcheck:
      # call the built-in /actuator/health endpoint and expect a 200 response
      # (workaround since no curl available in the container)
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8080 && printf 'GET /actuator/health HTTP/1.0\\r\\n\\r\\n' >&3 && head -n 1 <&3 | grep -q ' 200 '"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 30s
    develop:
      watch:
        - action: rebuild
          path: ./services/spring-api/src
        - action: rebuild
          path: ./services/spring-api/build.gradle.kts

  web-client:
    build: ./web-client
    ports:
      - "8080:8080"
    depends_on:
      spring-api:
        condition: service_healthy
    healthcheck:
      # call the client app and expect a 2xx / 3xx response
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/team-devsecops/"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 5s
    develop:
      watch:
        - action: rebuild
          path: ./web-client/src
        - action: rebuild
          path: ./web-client/index.html
        - action: rebuild
          path: ./web-client/vite.config.ts
        - action: rebuild
          path: ./web-client/package.json
