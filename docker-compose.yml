services:
  py-help-service:
    build: ./services/py-help-service
    ports:
      - "8090:8080"
    environment:
      SERVICE_API_KEY: ${HELP_SERVICE_KEY}
    develop:
      watch:
        - action: sync+restart
          path: ./services/py-help-service
          target: /app
          ignore:
            - __pycache__/
            - "*.pyc"
        - action: rebuild
          path: ./services/py-help-service/requirements.txt

  spring-api:
    build: ./services/spring-api
    ports:
      - "8081:8080"
    environment:
      AI_HELP_SERVICE_URL: http://py-help-service:8080
    depends_on:
      - py-help-service
    develop:
      watch:
        - action: rebuild
          path: ./services/spring-api/src
        - action: rebuild
          path: ./services/spring-api/build.gradle.kts

  web-client:
    build:
      context: ./web-client
      target: dev
    ports:
      - "8080:8080"
    environment:
      VITE_API_PROXY: http://spring-api:8080
    depends_on:
      - spring-api
    develop:
      watch:
        - action: sync
          path: ./web-client/src
          target: /app/src
        - action: sync
          path: ./web-client/index.html
          target: /app/index.html
        - action: sync+restart
          path: ./web-client/vite.config.ts
          target: /app/vite.config.ts
        - action: rebuild
          path: ./web-client/package.json
