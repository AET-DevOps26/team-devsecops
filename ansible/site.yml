---
- name: Deploy Real App
  hosts: web
  become: yes
  vars_files:
    - local_secrets.yml  # Ansible will load this if it exists

  tasks:
    - name: Ensure basic dependencies are installed
      apt:
        name: [git, python3-docker, python3-pip]
        state: present
        update_cache: yes

    - name: Install Docker via official script
      shell: curl -fsSL https://get.docker.com -o get-docker.sh && sh get-docker.sh
      args:
        creates: /usr/bin/docker

    - name: Ensure docker cli-plugins directory exists
      file:
        path: /usr/local/lib/docker/cli-plugins
        state: directory
        mode: '0755'

    - name: Install Docker Compose v2 as a CLI plugin
      get_url:
        url: https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64
        dest: /usr/local/lib/docker/cli-plugins/docker-compose
        mode: '0755'

    # Compose v2 only builds with BuildKit when the buildx plugin is present;
    # without it, it silently falls back to the classic builder, which rejects
    # the `RUN --mount=type=cache` lines in the Spring Dockerfile.
    - name: Get latest Docker Buildx release tag
      uri:
        url: https://api.github.com/repos/docker/buildx/releases/latest
        return_content: yes
      register: buildx_release

    - name: Install Docker Buildx as a CLI plugin
      get_url:
        url: "https://github.com/docker/buildx/releases/download/{{ buildx_release.json.tag_name }}/buildx-{{ buildx_release.json.tag_name }}.linux-amd64"
        dest: /usr/local/lib/docker/cli-plugins/docker-buildx
        mode: '0755'

    - name: Force clean any untracked blocking files
      command: git clean -fdx
      args:
        chdir: /var/www/app
      ignore_errors: yes

    - name: Clone application repository
      git:
        repo: 'https://github.com/AET-DevOps26/team-devsecops'
        dest: /var/www/app
        version: "{{ app_branch | default('main') }}"
        force: yes

    - name: Create .env file from template
      template:
        src: ../infra/.env.j2
        dest: /var/www/app/infra/.env
        mode: '0644'
        owner: azureuser

    - name: Create nginx.conf from template
      template:
        src: ../infra/nginx.conf.j2
        dest: /var/www/app/infra/nginx.conf
        mode: '0644'

    - name: Ensure previous containers are stopped
      command: docker compose down
      args:
        chdir: /var/www/app/infra
      ignore_errors: yes

    - name: Attempt Docker Deployment
      block:
        - name: Bring up application with Docker Compose
          command: docker compose up -d --build
          args:
            chdir: /var/www/app/infra
          environment:
            DOCKER_BUILDKIT: "1"
          register: compose_output

      rescue:
        - name: Show compose stdout on failure
          debug:
            var: compose_output.stdout_lines

        - name: Show compose stderr on failure
          debug:
            var: compose_output.stderr_lines

        - name: Show per-service container logs on failure
          command: docker compose logs --no-color
          args:
            chdir: /var/www/app/infra
          ignore_errors: yes
          register: compose_logs

        - name: Print container logs
          debug:
            var: compose_logs.stdout_lines

        - name: Fail the playbook so GitHub knows it failed
          fail:
            msg: "docker-compose up failed!"
