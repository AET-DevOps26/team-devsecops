openapi: 3.1.1
info:
  title: Cooking Assistant API
  version: 1.0.0
  description: API for recipe management and cooking assistance

servers:
  - url: http://localhost:8080/api/v1

tags:
  - name: Users
    description: User auth and preferences
  - name: Recipes
    description: Recipe storage and retrieval
  - name: AI
    description: AI-powered generation and assistance

paths:
  # -------------------------
  # USERS
  # -------------------------

  /users/register:
    post:
      tags: [Users]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created successfully
        "400":
          description: Invalid request body (e.g. blank username or password, username contains invalid characters)
        "409":
          description: Username already taken

  /users/login:
    post:
      tags: [Users]
      summary: Login and receive a JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT token returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid username or password

  /users/logout:
    post:
      tags: [Users]
      summary: Logout (client should discard the token; JWTs are stateless)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
        "401":
          description: Missing or invalid token

  /users/profile:
    get:
      tags: [Users]
      summary: Get current user profile and preferences
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile and preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Missing or invalid token
    put:
      tags: [Users]
      summary: Update user profile and preferences
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Profile and preferences updated
        "400":
          description: Invalid request body (e.g. blank password, username contains invalid characters)
        "401":
          description: Missing or invalid token
        "409":
          description: Username already taken
    delete:
      tags: [Users]
      summary: Delete current user account and all associated recipes (cascade)
      security:
        - bearerAuth: []
      responses:
        "204":
          description: User account and all associated data deleted
        "401":
          description: Missing or invalid token

  # -------------------------
  # RECIPES
  # -------------------------

  /recipes:
    get:
      tags: [Recipes]
      summary: List all recipes saved by the current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of user recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipe"
        "401":
          description: Missing or invalid token

    post:
      tags: [Recipes]
      summary: Save a recipe to the current user's collection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeInput"
      responses:
        "201":
          description: Recipe saved successfully
        "400":
          description: Invalid recipe data
        "401":
          description: Missing or invalid token

  /recipes/{recipeId}:
    get:
      tags: [Recipes]
      summary: Get a specific recipe by ID
      security:
        - bearerAuth: []
      parameters:
        - name: recipeId
          in: path
          required: true
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        "200":
          description: Recipe details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "400":
          description: Recipe ID is not a valid integer
        "401":
          description: Missing or invalid token
        "403":
          description: Recipe belongs to a different user
        "404":
          description: Recipe not found

  # -------------------------
  # AI
  # -------------------------

  /ai/recipes:
    post:
      tags: [AI]
      summary: Generate recipes using AI based on a prompt
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecipeRequest"
      responses:
        "200":
          description: AI-generated recipes (without IDs — save via POST /recipes to persist)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeInput"
        "400":
          description: Invalid request body
        "401":
          description: Missing or invalid token
        "502":
          description: AI service unavailable or returned an unparseable response

  /ai/help:
    post:
      tags: [AI]
      summary: Ask the AI cooking assistant a question about a recipe
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HelpRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelpResponse"
        "400":
          description: Invalid request body
        "401":
          description: Missing or invalid token
        "502":
          description: AI service unavailable or returned an unparseable response

# -------------------------
# SECURITY
# -------------------------

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # -------------------------
  # SCHEMAS
  # -------------------------

  schemas:
    AuthResponse:
      type: object
      required: [token]
      additionalProperties: false
      properties:
        token:
          type: string
          minLength: 1
          description: JWT bearer token to include in subsequent requests

    RegisterRequest:
      type: object
      required: [username, password]
      additionalProperties: false
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-zA-Z0-9_-]+$"
          description: Alphanumeric, underscores, and hyphens only
        password:
          type: string
          minLength: 8
          maxLength: 128

    LoginRequest:
      type: object
      required: [username, password]
      additionalProperties: false
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    UserProfile:
      type: object
      required: [username, preferences]
      properties:
        username:
          type: string
          minLength: 1
        preferences:
          $ref: "#/components/schemas/UserPreferences"

    UserProfileUpdate:
      type: object
      additionalProperties: false
      description: At least one field must be provided
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 64
          pattern: "^[a-zA-Z0-9_-]+$"
        password:
          type: string
          minLength: 8
          maxLength: 128
        preferences:
          $ref: "#/components/schemas/UserPreferences"

    UserPreferences:
      type: object
      additionalProperties: false
      properties:
        diet:
          type: string
          description: Dietary restriction or style (e.g. vegan, keto)
        allergies:
          type: array
          items:
            type: string
            minLength: 1
          description: List of ingredients the user is allergic to
        aboutMe:
          type: array
          items:
            type: string
            minLength: 1
          description: Free-form user context provided to the AI

    RecipeIngredient:
      type: object
      required: [quantity, unit, name]
      additionalProperties: false
      properties:
        quantity:
          type: number
          minimum: 0
        unit:
          type: string
          minLength: 1
          description: Unit of measurement (e.g. g, ml, cup, tbsp)
        name:
          type: string
          minLength: 1

    RecipeNutrients:
      type: object
      required: [calories, protein, fat, carbs]
      additionalProperties: false
      properties:
        calories:
          type: integer
          minimum: 0
        protein:
          type: integer
          minimum: 0
          description: Protein in grams
        fat:
          type: integer
          minimum: 0
          description: Fat in grams
        carbs:
          type: integer
          minimum: 0
          description: Carbohydrates in grams

    RecipeInput:
      type: object
      required: [title, ingredients, instructions, portions]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        ingredients:
          type: array
          items:
            $ref: "#/components/schemas/RecipeIngredient"
          minItems: 1
        instructions:
          type: array
          items:
            type: string
            minLength: 1
          minItems: 1
        portions:
          type: integer
          minimum: 1
        nutrients:
          $ref: "#/components/schemas/RecipeNutrients"

    Recipe:
      type: object
      allOf:
        - $ref: "#/components/schemas/RecipeInput"
        - type: object
          required: [id]
          properties:
            id:
              type: integer
              format: int64
              minimum: 1

    RecipeRequest:
      type: object
      required: [prompt]
      additionalProperties: false
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 2000

    RecipeRequestForwarded:
      type: object
      required: [profile, prompt]
      additionalProperties: false
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        prompt:
          type: string
          minLength: 1

    HelpRequest:
      type: object
      required: [recipe, prompt]
      additionalProperties: false
      properties:
        recipe:
          $ref: "#/components/schemas/RecipeInput"
        prompt:
          type: string
          minLength: 1
          maxLength: 2000

    HelpRequestForwarded:
      type: object
      required: [profile, recipe, prompt]
      additionalProperties: false
      properties:
        profile:
          $ref: "#/components/schemas/UserProfile"
        recipe:
          $ref: "#/components/schemas/RecipeInput"
        prompt:
          type: string
          minLength: 1

    HelpResponse:
      type: object
      required: [response]
      additionalProperties: false
      properties:
        response:
          type: string
          minLength: 1
