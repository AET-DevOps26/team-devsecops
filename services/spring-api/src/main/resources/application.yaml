spring:
  application:
    name: cookingAssistant
  jackson:
    default-property-inclusion: non_null
  datasource:
    # Locally defaults to H2 in-memory. On GCP Cloud Run, set DB_URL (e.g. jdbc:postgresql:///<db>?socketFactory=...&cloudSqlInstance=...), DB_USER, DB_PASSWORD env vars
    url: ${DB_URL:jdbc:h2:mem:cookingdb;DB_CLOSE_DELAY=-1}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      # create-drop: wipe and recreate tables every restart
      # update: keep data between restarts
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: false
    open-in-view: false
  mvc:
    throw-exception-if-no-handler-found: true
  h2:
    console:
      enabled: false # http://localhost:8080/h2-console

server:
  port: 8080

ai:
  hmac:
    secret: ${INTERNAL_AUTH_SECRET}
  help:
    service:
      url: ${AI_HELP_SERVICE_URL:http://localhost:8091}
  recipe:
    service:
      url: ${AI_RECIPE_SERVICE_URL:http://localhost:8090}

management:
  endpoints:
    web:
      exposure:
        include: health  # only /actuator/health is exposed, not info/metrics/env/etc.
  endpoint:
    health:
      probes:
        enabled: true   # creates /actuator/health/liveness and /actuator/health/readiness
      show-details: never  # don't leak datasource URL or other internals in the response

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-this-in-production-use-env-var}
    expiration-ms: 86400000   # 24 hours

logging:
  structured:
    format:
      console: ecs   # JSON structured logs — comment out for plain-text
  level:
    root: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
