---
# All values here are fixed for the K8s deployment — no variables needed.
# "postgres" in DB_URL/DB_USER refers to the ClusterIP service and default PG user.
# JPA_DDL_AUTO "update" keeps data between restarts (use "create-drop" only for dev wipes).
apiVersion: v1
kind: ConfigMap
metadata:
  name: spring-api-config
  namespace: app
data:
  DB_URL: "jdbc:postgresql://postgres:5432/cooking"
  DB_USER: "postgres"
  AI_HELP_SERVICE_URL: "http://py-help-service:8080"
  AI_RECIPE_SERVICE_URL: "http://py-recipe-service:8080"
  JPA_DDL_AUTO: "update"
