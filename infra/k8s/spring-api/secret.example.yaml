---
# Template — NEVER commit real values.
#
# IMPORTANT: INTERNAL_AUTH_SECRET must be the SAME value across:
#   spring-api-secret, py-recipe-secret, and py-help-secret.
# It is the shared HMAC key used to authenticate inter-service calls.
#
# Generate all secrets at once:
#   export DB_PASS=$(openssl rand -base64 32)
#   export JWT_SECRET=$(openssl rand -base64 64)
#   export HMAC_SECRET=$(openssl rand -base64 32)
#
#   kubectl create secret generic spring-api-secret -n app \
#     --from-literal=DB_PASSWORD=$DB_PASS \
#     --from-literal=JWT_SECRET=$JWT_SECRET \
#     --from-literal=INTERNAL_AUTH_SECRET=$HMAC_SECRET
#
#   kubectl create secret generic py-recipe-secret -n app \
#     --from-literal=SERVICE_API_KEY=<gemini-key> \
#     --from-literal=INTERNAL_AUTH_SECRET=$HMAC_SECRET
#
#   kubectl create secret generic py-help-secret -n app \
#     --from-literal=SERVICE_API_KEY=<gemini-key> \
#     --from-literal=INTERNAL_AUTH_SECRET=$HMAC_SECRET
apiVersion: v1
kind: Secret
metadata:
  name: spring-api-secret
  namespace: app
type: Opaque
stringData:
  DB_PASSWORD: REPLACE_WITH_DB_PASSWORD           # same value as postgres-secret.password
  JWT_SECRET: REPLACE_WITH_JWT_SECRET
  INTERNAL_AUTH_SECRET: REPLACE_WITH_HMAC_SECRET  # must match py-recipe-secret and py-help-secret
