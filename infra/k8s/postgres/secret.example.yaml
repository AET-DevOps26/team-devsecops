---
# Template — NEVER commit real values.
# The DB user is always "postgres" (PostgreSQL default), so only the password is secret.
#
#   kubectl create secret generic postgres-secret -n app \
#     --from-literal=password=$(openssl rand -base64 32)
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: app
type: Opaque
stringData:
  password: REPLACE_WITH_STRONG_PASSWORD
