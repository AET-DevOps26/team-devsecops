---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alloy
  namespace: monitoring
---
# Namespace-scoped Role in monitoring — grants Alloy permission to read pod
# metadata and stream logs via the K8s API within this namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alloy-log-reader
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alloy-log-reader
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: alloy-log-reader
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: monitoring
---
# Same Role in app namespace — the ServiceAccount lives in monitoring but
# RoleBindings can reference subjects from any namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alloy-log-reader
  namespace: app
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alloy-log-reader
  namespace: app
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: alloy-log-reader
subjects:
  - kind: ServiceAccount
    name: alloy
    namespace: monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    // Discover pods only in the namespaces we have permission to read.
    // Scoping discovery here avoids needing cluster-wide ClusterRole.
    discovery.kubernetes "pods" {
      role = "pod"
      namespaces {
        names = ["app", "monitoring"]
      }
    }

    // Map pod metadata to Loki stream labels
    discovery.relabel "pods" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
      // Grafana Logs Drilldown follows OTel convention and groups by service_name
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "service_name"
      }
    }

    // Tail logs from each discovered pod via the K8s log streaming API
    loki.source.kubernetes "pods" {
      targets    = discovery.relabel.pods.output
      forward_to = [loki.write.local.receiver]
    }

    // Push collected logs to Loki
    loki.write "local" {
      endpoint {
        url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
      }
    }
---
# Single Deployment (not DaemonSet) — loki.source.kubernetes reads logs via the
# K8s API, so one pod is sufficient regardless of how many nodes the cluster has.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: monitoring
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      serviceAccountName: alloy
      containers:
        - name: alloy
          image: grafana/alloy:v1.7.1
          args:
            - run
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
            - --server.http.listen-addr=0.0.0.0:12345
          ports:
            - name: http
              containerPort: 12345
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          volumeMounts:
            - name: config
              mountPath: /etc/alloy
            - name: data
              mountPath: /var/lib/alloy/data
          resources:
            requests:
              cpu: 30m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: alloy-config
        - name: data
          emptyDir: {}
