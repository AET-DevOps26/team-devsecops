---
# Per-PR frontend preview
# ${WEB_CLIENT_IMAGE} needs to be substituted by the caller
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-client
  template:
    metadata:
      labels:
        app: web-client
    spec:
      containers:
        - name: web-client
          image: ${WEB_CLIENT_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /team-devsecops/
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /team-devsecops/
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
# expose the pod at web-client:8080
apiVersion: v1
kind: Service
metadata:
  name: web-client
spec:
  selector:
    app: web-client
  ports:
    - port: 8080
      targetPort: 8080
---
# Make the prod backend available at spring-api:8080 for the frontend
apiVersion: v1
kind: Service
metadata:
  name: spring-api
spec:
  type: ExternalName
  externalName: spring-api.app.svc.cluster.local
  ports:
    - port: 8080
