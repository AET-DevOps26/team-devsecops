name: Deploy Spring API

on:
  push:
    paths: ['services/spring-api/**', '.github/workflows/deploy-spring-api.yml']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'sapmachine'

      - name: Build
        run: cd services/spring-api && ./gradlew build --no-daemon

  deploy:
    needs: [build]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Authorize Docker
        run: gcloud auth configure-docker --quiet

      - name: Build and Push
        run: |
          docker build -t gcr.io/${{ vars.GCP_PROJECT_ID }}/spring-api:${{ github.sha }} ./services/spring-api
          docker push gcr.io/${{ vars.GCP_PROJECT_ID }}/spring-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy spring-api \
            --image gcr.io/${{ vars.GCP_PROJECT_ID }}/spring-api:${{ github.sha }} \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "AI_HELP_SERVICE_URL=${{ vars.AI_HELP_SERVICE_URL }}"
