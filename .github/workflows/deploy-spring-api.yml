name: Spring API - Deploy

on:
  push:
    paths: ['services/spring-api/**', '.github/workflows/deploy-spring-api.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'sapmachine'

      - name: Build
        run: cd services/spring-api && ./gradlew build --no-daemon

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Spring API Tests
          path: services/spring-api/build/test-results/test/*.xml
          reporter: java-junit
