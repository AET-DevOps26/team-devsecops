name: Spring API - Deploy

on:
  push:
    paths: ['services/spring-api/**', '.github/workflows/deploy-spring-api.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'sapmachine'

      - name: Build
        run: cd services/spring-api && ./gradlew build --no-daemon

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Spring API Tests
          path: services/spring-api/build/test-results/test/*.xml
          reporter: java-junit

  deploy:
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.API_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Authorize Docker
        run: gcloud auth configure-docker --quiet

      - name: Build and Push
        run: |
          docker build -t gcr.io/${{ vars.GCP_PROJECT_ID }}/spring-api:${{ github.sha }} ./services/spring-api
          docker push gcr.io/${{ vars.GCP_PROJECT_ID }}/spring-api:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy spring-api \
            --image gcr.io/${{ vars.GCP_PROJECT_ID }}/spring-api:${{ github.sha }} \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "AI_HELP_SERVICE_URL=${{ vars.AI_HELP_SERVICE_URL }},AI_RECIPE_SERVICE_URL=${{ vars.AI_RECIPE_SERVICE_URL }},DB_URL=${{ vars.DB_URL }},DB_USER=${{ vars.DB_USER }},DB_PASSWORD=${{ secrets.DB_PASSWORD }},JWT_SECRET=${{ secrets.JWT_SECRET }},JPA_DDL_AUTO=${{ vars.JPA_DDL_AUTO }},INTERNAL_AUTH_SECRET=${{ secrets.INTERNAL_AUTH_SECRET }}"
