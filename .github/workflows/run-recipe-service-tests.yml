name: Run Recipe Service Tests

on:
  push:
    paths: ['services/py-recipe-service/**']
  pull_request:
    paths: ['services/py-recipe-service/**']

jobs:

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/py-recipe-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Linting Tool
        run: pip install ruff
      - name: Run Ruff Linting
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/py-recipe-service
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        env:
          INTERNAL_AUTH_SECRET: ${{ secrets.INTERNAL_AUTH_SECRET }}
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
        run: |
          pytest