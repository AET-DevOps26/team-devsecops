name: Deploy to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'web-client/**'
      - 'services/**'
      - 'infra/**'
      - 'ansible/**'
      - '.github/workflows/deploy-ansible.yml'

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: my-app-rg
  VM_NAME: my-vm

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # az runs in the pinned azure/cli container to avoid the Python 3.14
      # command-module deadlock in the runner's bundled CLI (Azure/azure-cli#32980).
      - name: Resolve VM public IP
        id: ip
        uses: azure/cli@v2
        with:
          azcliversion: "2.64.0"
          inlineScript: |
            IP=$(az vm show -d \
              --resource-group "$RESOURCE_GROUP" \
              --name "$VM_NAME" \
              --query publicIps -o tsv)
            if [ -z "$IP" ]; then
              echo "::error::VM has no public IP. Run 'Start environment' first."
              exit 1
            fi
            echo "ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Set up Ansible
        run: pip install ansible

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          name: id_rsa
          known_hosts: 'placeholder' # Will be overwritten by ssh-keyscan next

      - name: Scan VM Host Key
        env:
          VM_IP: ${{ steps.ip.outputs.ip }}
        run: ssh-keyscan -H "$VM_IP" >> ~/.ssh/known_hosts

      - name: Write inventory with the resolved IP
        env:
          VM_IP: ${{ steps.ip.outputs.ip }}
        run: |
          cat > infra/inventory.ini <<EOF
          [web]
          $VM_IP

          [all:vars]
          ansible_user=azureuser
          ansible_ssh_private_key_file=~/.ssh/id_rsa
          ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          ansible_python_interpreter=/usr/bin/python3.10
          EOF

      - name: Run Playbook
        run: |
          ansible-playbook -i infra/inventory.ini ansible/site.yml \
          -u azureuser \
          -e "app_branch=${{ github.head_ref || github.ref_name }}" \
          -e "gemini_model=${{ vars.GEMINI_MODEL }}" \
          -e "gemini_help_service_key=${{ secrets.GEMINI_HELP_SERVICE_KEY }}" \
          -e "gemini_recipe_service_key=${{ secrets.GEMINI_RECIPE_SERVICE_KEY }}" \
          -e "internal_auth_secret=${{ secrets.INTERNAL_AUTH_SECRET }}" \
          -e "db_user=${{ secrets.AZURE_DB_USER }}" \
          -e "db_password=${{ secrets.AZURE_DB_PASSWORD }}"
