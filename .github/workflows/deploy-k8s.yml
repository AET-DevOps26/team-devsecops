name: Deploy to Kubernetes

on:
  push:
    # branches: [main]
    paths:
      - "services/**"
      - "web-client/**"
      - "infra/k8s/**"
      - ".github/workflows/deploy-k8s.yml"
  workflow_dispatch:

jobs:
  # ── Build all four images and push to GHCR ──────────────────────────────────
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: spring-api
            context: services/spring-api
          - service: py-recipe-service
            context: services/py-recipe-service
          - service: py-help-service
            context: services/py-help-service
          - service: web-client
            context: web-client
            # No --target needed: the final (nginx) stage is the production image.
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          # Two tags: one pinned to the commit SHA (immutable), one :latest (convenience).
          # The deploy step uses the SHA tag so rollbacks are exact.
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

  # ── Apply manifests to the Rancher cluster ───────────────────────────────────
  deploy:
    needs: build-images
    runs-on: ubuntu-latest
    environment: kubernetes

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply namespaces
        run: kubectl apply -f infra/k8s/namespace.yaml

      # Secrets are created imperatively (not from the .example.yaml templates).
      # --dry-run=client -o yaml | kubectl apply -f - is idempotent: creates on first
      # run, updates on subsequent runs, never errors if already exists.
      #
      # Required GitHub Secrets (Settings → Secrets and variables → Actions):
      #   DB_PASSWORD          — PostgreSQL password
      #   JWT_SECRET           — JWT signing key
      #   INTERNAL_AUTH_SECRET — shared HMAC key between spring-api and python services
      #   HELP_SERVICE_KEY     — Gemini API key for py-help-service
      #   RECIPE_SERVICE_KEY   — Gemini API key for py-recipe-service
      #   KUBE_CONFIG          — base64-encoded kubeconfig from Rancher (base64 -w0)
      - name: Upsert K8s secrets
        run: |
          kubectl create secret generic postgres-secret -n app \
            --from-literal=password="${{ secrets.DB_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic spring-api-secret -n app \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=INTERNAL_AUTH_SECRET="${{ secrets.INTERNAL_AUTH_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic py-recipe-secret -n app \
            --from-literal=SERVICE_API_KEY="${{ secrets.RECIPE_SERVICE_KEY }}" \
            --from-literal=INTERNAL_AUTH_SECRET="${{ secrets.INTERNAL_AUTH_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic py-help-secret -n app \
            --from-literal=SERVICE_API_KEY="${{ secrets.HELP_SERVICE_KEY }}" \
            --from-literal=INTERNAL_AUTH_SECRET="${{ secrets.INTERNAL_AUTH_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Pin image tags to current commit SHA
        # Replace :latest in the checked-out manifests with the exact SHA before applying.
        # This ensures the cluster runs exactly the images built in the job above.
        run: |
          REPO=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA="${{ github.sha }}"

          sed -i "s|ghcr.io/aet-devops26/team-devsecops/spring-api:latest|${REPO}/spring-api:${SHA}|g" \
            infra/k8s/spring-api/deployment.yaml
          sed -i "s|ghcr.io/aet-devops26/team-devsecops/py-recipe-service:latest|${REPO}/py-recipe-service:${SHA}|g" \
            infra/k8s/py-recipe-service/deployment.yaml
          sed -i "s|ghcr.io/aet-devops26/team-devsecops/py-help-service:latest|${REPO}/py-help-service:${SHA}|g" \
            infra/k8s/py-help-service/deployment.yaml
          sed -i "s|ghcr.io/aet-devops26/team-devsecops/web-client:latest|${REPO}/web-client:${SHA}|g" \
            infra/k8s/web-client/deployment.yaml

      - name: Deploy PostgreSQL (StatefulSet)
        run: kubectl apply -f infra/k8s/postgres/

      - name: Wait for PostgreSQL to be ready
        run: kubectl rollout status statefulset/postgres -n app --timeout=180s

      - name: Deploy application services
        run: |
          kubectl apply -f infra/k8s/spring-api/
          kubectl apply -f infra/k8s/py-recipe-service/
          kubectl apply -f infra/k8s/py-help-service/
          kubectl apply -f infra/k8s/web-client/
          kubectl apply -f infra/k8s/ingress.yaml

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/spring-api -n app --timeout=300s
          kubectl rollout status deployment/py-recipe-service -n app --timeout=180s
          kubectl rollout status deployment/py-help-service -n app --timeout=180s
          kubectl rollout status deployment/web-client -n app --timeout=120s

      - name: Show deployment summary
        run: |
          echo "=== Pods ==="
          kubectl get pods -n app -o wide
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n app
          echo ""
          echo "URL: https://devsecops.stud.k8s.aet.tum.de/"
