name: Web Client

on:
  push:
    branches: [main]
    paths:
      - 'web-client/**'
      - '.github/workflows/build-client.yml'
  pull_request:
    paths:
      - 'web-client/**'
      - '.github/workflows/build-client.yml'
  workflow_dispatch:
  workflow_call:
    inputs:
      push_image:
        type: boolean
        default: false

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web-client/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

  build-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: web-client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web-client/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --coverage

      - name: Publish unit test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Web Client Unit Tests
          path: web-client/test-results/vitest-junit.xml
          reporter: jest-junit

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-client-coverage
          path: web-client/coverage/
          retention-days: 7

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Publish E2E test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Web Client E2E Tests
          path: web-client/test-results/playwright-junit.xml
          reporter: jest-junit

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web-client/playwright-report/
          retention-days: 7

  build:
    needs: [lint, build-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || inputs.push_image == true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: web-client
          push: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || inputs.push_image == true }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/web-client:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/web-client:latest
