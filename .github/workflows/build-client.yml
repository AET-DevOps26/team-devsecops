name: Web Client - Lint & Test

on:
  pull_request:
    paths: ['web-client/**', '.github/workflows/build-client.yml']
  push:
    branches: [main]
    paths: ['web-client/**', '.github/workflows/build-client.yml']

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web-client/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

  build-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: web-client
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web-client/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Publish unit test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Web Client Unit Tests
          path: web-client/test-results/vitest-junit.xml
          reporter: jest-junit

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Publish E2E test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Web Client E2E Tests
          path: web-client/test-results/playwright-junit.xml
          reporter: jest-junit

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web-client/playwright-report/
          retention-days: 7
