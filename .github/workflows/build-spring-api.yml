name: Spring API

on:
  push:
    paths:
      - 'services/spring-api/**'
      - 'web-client/pacts/**'
      - '.github/workflows/build-spring-api.yml'
  workflow_dispatch:
  workflow_call:
    inputs:
      push_image:
        type: boolean
        default: false

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/spring-api
    steps:
      - uses: actions/checkout@v4
      - name: Download ktlint
        run: |
          curl -sSLo ktlint "https://github.com/ktlint/ktlint/releases/latest/download/ktlint"
          chmod +x ktlint
      - name: Run ktlint
        run: ./ktlint 'src/**/*.kt'

  test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    defaults:
      run:
        working-directory: services/spring-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Run tests
        run: ./gradlew test
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Spring API Tests
          path: services/spring-api/build/test-results/**/*.xml
          reporter: java-junit

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spring-api-coverage
          path: services/spring-api/build/reports/jacoco/test/html/
          retention-days: 7

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || inputs.push_image == true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase image prefix
        run: echo "IMAGE_PREFIX=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: services/spring-api
          push: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || inputs.push_image == true }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/spring-api:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/spring-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
