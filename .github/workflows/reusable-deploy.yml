name: Reusable Deployment

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_dir:
        required: true
        type: string
    secrets:
      GCP_SA_KEY:
        required: true
      GEMINI_API_KEY:
        required: true
      INTERNAL_AUTH_SECRET:
        required: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Authorize Docker
        run: gcloud auth configure-docker --quiet

      - name: Build and Push
        run: |
          # Use the variable GCP_PROJECT_ID from your GitHub Vars
          docker build -t gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ inputs.service_name }}:${{ github.sha }} ./${{ inputs.service_dir }}
          docker push gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ inputs.service_name }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ inputs.service_name }} \
            --image gcr.io/${{ vars.GCP_PROJECT_ID }}/${{ inputs.service_name }}:${{ github.sha }} \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars "SERVICE_API_KEY=${{ secrets.GEMINI_API_KEY }}"